name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.95'
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export AR_x86_64_unknown_linux_musl=ar
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
          fi
          cargo build --release --workspace --target "${{ matrix.target }}" --bins

      - name: Verify static linkage (musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          set -euo pipefail
          for bin in houdini-server houdini-client; do
            path="target/${{ matrix.target }}/release/${bin}"
            file "${path}"
            file "${path}" | grep -qE 'statically linked|static-pie linked' \
              || { echo "::error::${bin} is not statically linked"; ldd "${path}" 2>&1; exit 1; }
          done

      - name: Determine asset version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo "is_release=true" >> "${GITHUB_OUTPUT}"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "${GITHUB_OUTPUT}"
            echo "is_release=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          target="${{ matrix.target }}"
          name="houdini-${version}-${target}"
          workdir="$(mktemp -d)"
          stage="${workdir}/${name}"
          mkdir -p "${stage}"
          cp "target/${target}/release/houdini-server" "${stage}/"
          cp "target/${target}/release/houdini-client" "${stage}/"
          cp examples/server.toml examples/client.toml README.md "${stage}/"
          mkdir -p dist
          tar -C "${workdir}" -czf "dist/${name}.tar.gz" "${name}"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
          else
            (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
          fi
          ls -la dist/
          echo "name=${name}" >> "${GITHUB_OUTPUT}"

      - name: Upload as workflow artifact (manual runs)
        if: steps.ver.outputs.is_release == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.name }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Attach to GitHub release (tag pushes)
        if: steps.ver.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
